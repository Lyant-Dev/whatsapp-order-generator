<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp Order Generator</title>
    <!-- ============== STYLE CSS ============ -->
    <link rel="stylesheet" href="style.css" />
    <!-- ============= REMIX ICONS ==============  -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1>Daftar Menu</h1>
    <div class="menu-card-container">
      <div class="menu-card" data-name="Pad Thai" data-price="12000">
        <img src="img/pad-thai.png" alt="pad thai" class="menu-img" />
        <h2 class="menu-name">Pad Thai</h2>
        <p class="menu-price">Rp12.000</p>
        <div class="menu-qty">
          <span class="remove-item">-</span><span class="item-qty">0</span
          ><span class="add-item">+</span>
        </div>
      </div>
      <div class="menu-card" data-name="Adobo" data-price="14000">
        <img src="img/adobo.png" alt="adobo" class="menu-img" />
        <h2 class="menu-name">Adobo</h2>
        <p class="menu-price">Rp14.000</p>
        <div class="menu-qty">
          <span class="remove-item">-</span><span class="item-qty">0</span
          ><span class="add-item">+</span>
        </div>
      </div>
      <div class="menu-card" data-name="Beef Pho" data-price="16000">
        <img src="img/beef-pho.png" alt="beef pho" class="menu-img" />
        <h2 class="menu-name">Beef Pho</h2>
        <p class="menu-price">Rp16.000</p>
        <div class="menu-qty">
          <span class="remove-item">-</span><span class="item-qty">0</span
          ><span class="add-item">+</span>
        </div>
      </div>
      <div class="menu-card" data-name="Biryani Rice" data-price="12000">
        <img src="img/biryani-rice.png" alt="biryani-rice" class="menu-img" />
        <h2 class="menu-name">Biryani Rice</h2>
        <p class="menu-price">Rp12.000</p>
        <div class="menu-qty">
          <span class="remove-item">-</span><span class="item-qty">0</span
          ><span class="add-item">+</span>
        </div>
      </div>
      <div class="menu-card" data-name="Pasta Carbonara" data-price="14000">
        <img src="img/carbonara.png" alt="pasta carbonara" class="menu-img" />
        <h2 class="menu-name">Pasta Carbonara</h2>
        <p class="menu-price">Rp14.000</p>
        <div class="menu-qty">
          <span class="remove-item">-</span><span class="item-qty">0</span
          ><span class="add-item">+</span>
        </div>
      </div>
      <div class="menu-card" data-name="Hainanese Chicken" data-price="16000">
        <img
          src="img/hainanese-chicken.png"
          alt="hainanese chicken"
          class="menu-img"
        />
        <h2 class="menu-name">Hainanese Chicken</h2>
        <p class="menu-price">Rp16.000</p>
        <div class="menu-qty">
          <span class="remove-item">-</span><span class="item-qty">0</span
          ><span class="add-item">+</span>
        </div>
      </div>
      <div class="menu-card" data-name="Lasagna" data-price="12000">
        <img src="img/lasagna.png" alt="" class="menu-img" />
        <h2 class="menu-name">Lasagna</h2>
        <p class="menu-price">Rp12.000</p>
        <div class="menu-qty">
          <span class="remove-item">-</span><span class="item-qty">0</span
          ><span class="add-item">+</span>
        </div>
      </div>
      <div class="menu-card" data-name="Nasi Lemak" data-price="14000">
        <img src="img/nasi-lemak.png" alt="nasi lemak" class="menu-img" />
        <h2 class="menu-name">Nasi Lemak</h2>
        <p class="menu-price">Rp14.000</p>
        <div class="menu-qty">
          <span class="remove-item">-</span><span class="item-qty">0</span
          ><span class="add-item">+</span>
        </div>
      </div>
      <div class="menu-card" data-name="Neapolitan Pizza" data-price="16000">
        <img
          src="img/neapolitan-pizza.png"
          alt="neapolitan pizza"
          class="menu-img"
        />
        <h2 class="menu-name">Neapolitan Pizza</h2>
        <p class="menu-price">Rp16.000</p>
        <div class="menu-qty">
          <span class="remove-item">-</span><span class="item-qty">0</span
          ><span class="add-item">+</span>
        </div>
      </div>
    </div>

    <div class="order-summary">
      <h1>Total Pesanan</h1>
      <ul></ul>
    </div>

    <h1>Data Pelanggan</h1>
    <div class="form-container" id="form-container">
      <form action="/action" id="form-data">
        <div class="form-row">
          <div class="form-input-group">
            <label for="name">Nama:</label>
            <input
              type="text"
              name="name"
              id="name"
              placeholder="Masukkan nama Anda"
              maxlength="50"
              required
            />
            <i id="name-icon" class="ri-close-large-line error-icon"></i>
          </div>
          <div class="error-message" id="name-error"></div>
        </div>
        <div class="form-row">
          <div class="form-input-group">
            <label for="number">Nomor HP:</label>
            <input
              type="tel"
              name="number"
              id="number"
              placeholder="0811 1111 1111"
              required
            />
            <i id="number-icon" class="ri-close-large-line error-icon"></i>
          </div>
          <div class="error-message" id="number-error"></div>
        </div>
        <div class="form-row">
          <div class="form-input-group">
            <label for="address">Alamat:</label>
            <input
              type="text"
              name="address"
              id="address"
              placeholder="Masukkan alamat tujuan"
              maxlength="50"
              required
            />
            <i id="address-icon" class="ri-close-large-line error-icon"></i>
          </div>
          <div class="error-message" id="address-error"></div>
        </div>
        <div class="form-row">
          <div class="form-input-group">
            <label for="date">Tanggal Pengiriman:</label>
            <input type="date" name="date" id="date" required />
            <i id="date-icon" class="ri-close-large-line error-icon"></i>
          </div>
          <div class="error-message" id="date-error"></div>
        </div>
        <div class="form-row">
          <div class="form-input-group">
            <label for="note">Catatan</label>
            <textarea
              name="note"
              id="note"
              rows="7"
              cols="32"
              placeholder="Ketik pesan Anda di sini"
              maxlength="500"
            ></textarea>
          </div>
        </div>
        <div class="button-container">
          <button type="submit" id="submit-btn">Kirim</button>
        </div>
      </form>
    </div>
    <!-- ============== APP JS ================== -->
    <script src="app.js"></script>
  </body>
</html>
